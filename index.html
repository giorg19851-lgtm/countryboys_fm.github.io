<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>8-Bit Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            /* Фоновое изображение (пиксельная картинка) */
            background-image: url('https://raw.githubusercontent.com/giorg19851-lgtm/countryboys_fm.github.io/main/fm.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            
            /* Затемнение для читаемости текста */
            background-color: rgba(0, 0, 0, 0.7);
            background-blend-mode: multiply;
            
            /* Пиксельный рендеринг (отключает сглаживание) */
            image-rendering: pixelated;
            image-rendering: crisp-edges; /* для старых браузеров */
            
            /* Цветокоррекция для ретро-эффекта */
            filter: brightness(110%) contrast(130%) saturate(140%) sepia(5%);
            
            /* Базовые стили текста */
            font-family: 'VT323', monospace;
            color: #88ff88;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        /* Карточка плеера – полупрозрачная, чтобы фон просвечивал */
        .player-card {
            background: #000000aa; /* чуть темнее для контраста */
            border: 3px solid #88ff88;
            border-radius: 0px;
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 20px #88ff88;
            backdrop-filter: blur(2px);
        }
        
        h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            color: #ffaa00;
            text-shadow: 2px 2px 0 #884400;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-family: 'VT323', monospace;
            font-size: 18px;
            color: #88ff88;
            border-top: 1px dashed #88ff88;
            border-bottom: 1px dashed #88ff88;
            display: inline-block;
            padding: 5px 0;
            margin-bottom: 20px;
        }
        
        .status {
            font-family: 'VT323', monospace;
            font-size: 20px;
            background: #000000;
            border: 1px solid #88ff88;
            padding: 8px;
            margin: 20px auto;
            width: fit-content;
        }
        
        .footer {
            font-family: 'VT323', monospace;
            font-size: 14px;
            color: #88ff88aa;
            margin-top: 20px;
        }
        
        .blinking-cursor {
            display: inline-block;
            width: 10px;
            animation: blink 1s step-end infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        button {
            background: #000000;
            border: 2px solid #88ff88;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 16px;
            color: #88ff88;
            cursor: pointer;
            margin-top: 15px;
        }
        
        button:active {
            background: #88ff88;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <h1>🎧 DJ TOKYO ALREADY HATES US</h1>
        <div class="subtitle">пососешь ок?</div>
        
        <!-- Скрытый аудиоплеер без контролов -->
        <audio id="radioPlayer" autoplay style="display: none;">
            <source src="https://github.com/giorg19851-lgtm/countryboys_fm.github.io/raw/refs/heads/main/roxy%20(1).mp3" type="audio/mpeg">
        </audio>
        
        <div class="status" id="playbackStatus">
            🎵 ИГРАЕТ: НЕИЗВЕСТЕН - БЕЗ НАЗВАНИЯ <span class="blinking-cursor">_</span>
        </div>
        <div class="footer">
            выключи эту хуйню ❤️
        </div>
        <button id="closeBtn">ЗАКРЫТЬ ПЛЕЕР</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Настройка кнопки "Закрыть"
        tg.MainButton.setText("ЗАКРЫТЬ");
        tg.MainButton.onClick(function() {
            tg.close();
        });
        tg.MainButton.show();
        
        // Дополнительная кнопка внутри страницы
        document.getElementById('closeBtn').addEventListener('click', function() {
            tg.close();
        });
        
        // Управление аудио
        const audio = document.getElementById('radioPlayer');
        const statusDiv = document.getElementById('playbackStatus');
        
        // Принудительное автовоспроизведение с обходом блокировки
        function attemptPlay() {
            audio.play().catch(() => {
                // Ждём первого касания или клика
                const playOnInteraction = () => {
                    audio.play();
                    document.body.removeEventListener('touchstart', playOnInteraction);
                    document.body.removeEventListener('click', playOnInteraction);
                };
                document.body.addEventListener('touchstart', playOnInteraction);
                document.body.addEventListener('click', playOnInteraction);
            });
        }
        
        window.addEventListener('load', function() {
            attemptPlay();
        });
        
        if (audio) {
            audio.addEventListener('play', () => {
                statusDiv.innerHTML = '🎵 ИГРАЕТ: НЕИЗВЕСТЕН - БЕЗ НАЗВАНИЯ <span class="blinking-cursor">_</span>';
            });
            audio.addEventListener('pause', () => {
                setTimeout(() => { audio.play(); }, 100);
            });
            audio.addEventListener('ended', () => {
                audio.currentTime = 0;
                audio.play();
                statusDiv.innerHTML = '🔄 ПОВТОР: СЛЫШАТЬ <span class="blinking-cursor">_</span>';
            });
        }
    </script>
</body>
</html>
