<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vinyl Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'VT323', monospace; /* более тонкий шрифт */
            overflow: hidden;
        }

        /* Контейнер-пластинка (круг) */
        .vinyl {
            position: relative;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        /* Видео-фон (вращается) */
        .vinyl-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .vinyl-video.spinning {
            animation: spin 4s linear infinite;
        }

        /* Чёрное отверстие в центре (вращается вместе с видео) */
        .vinyl-video::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12%;
            height: 12%;
            background: black;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px white;
            pointer-events: none;
        }

        /* Слой с кнопками и текстом — без фона, прямо на пластинке */
        .vinyl-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
            z-index: 10;
            pointer-events: auto;
            background: transparent;
        }

        h1 {
            font-family: 'Press Start 2P', monospace;
            font-weight: 100;  /* делаем тоньше */
            font-size: 12px;
            margin-bottom: 12px;
            letter-spacing: 1px;
            color: white;
            text-shadow: 1px 1px 0 black, 0 0 8px rgba(0,0,0,0.8);
            word-break: break-word;
        }

        .status {
            font-family: 'VT323', monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid white;
            padding: 6px 10px;
            margin: 8px auto;
            display: inline-block;
            backdrop-filter: blur(2px);
            letter-spacing: 1px;
        }

        .controls {
            margin: 12px 0;
        }

        button {
            background: rgba(0,0,0,0.7);
            border: 1px solid white;
            font-family: 'VT323', monospace;
            font-size: 14px;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
            margin: 5px;
            backdrop-filter: blur(2px);
            transition: 0.05s linear;
        }
        button:active {
            background: white;
            color: black;
        }

        .footer {
            font-family: 'VT323', monospace;
            font-size: 10px;
            margin-top: 10px;
            color: #ccc;
            text-shadow: 1px 1px 0 black;
        }

        .blinking-cursor {
            display: inline-block;
            width: 8px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Эффект для мерцающих букв */
        .glitch-letter {
            display: inline-block;
            transition: opacity 0.05s ease;
        }
        .glitch-letter.off {
            opacity: 0;
        }
    </style>
</head>
<body>
<div class="vinyl">
    <video class="vinyl-video" id="vinylVideo" loop muted playsinline>
        <source src="https://github.com/giorg19851-lgtm/countryboys_fm.github.io/raw/refs/heads/main/document_5386562835193042585.mp4" type="video/mp4">
    </video>
    <div class="vinyl-controls">
        <h1 id="glitchTitle">COUNTRY BOYS FM</h1>
        <div class="status" id="playbackStatus">НАЖМИ ЧТОБЫ СЛЫШАТЬ</div>
        <div class="controls">
            <button id="startBtn">ЖМЯК</button>
        </div>
        <div class="footer" id="glitchFooter">выключи эту хуйню</div>
        <button id="closeBtn">НЕ СЛЫШАТЬ</button>
    </div>
</div>

<audio id="radioPlayer" style="display: none;" preload="auto"></audio>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // ---------- АНИМАЦИЯ "ВЫКЛЮЧАЮЩИХСЯ БУКВ" ----------
    let glitchIntervals = [];

    function stopAllGlitch() {
        glitchIntervals.forEach(clearInterval);
        glitchIntervals = [];
    }

    function applyGlitchToElement(element) {
        if (!element) return;
        const originalText = element.innerText;
        if (!originalText) return;
        
        // Разбиваем текст на буквы и оборачиваем каждую в span
        const letters = originalText.split('');
        const spans = letters.map(char => {
            if (char === ' ') return ' ';
            return `<span class="glitch-letter">${char}</span>`;
        });
        element.innerHTML = spans.join('');
        
        const spansList = element.querySelectorAll('.glitch-letter');
        if (spansList.length === 0) return;
        
        // Случайное мерцание для каждой буквы
        const interval = setInterval(() => {
            const randomIndex = Math.floor(Math.random() * spansList.length);
            const letter = spansList[randomIndex];
            if (!letter) return;
            letter.classList.add('off');
            setTimeout(() => {
                letter.classList.remove('off');
            }, 150);
        }, Math.random() * 400 + 300); // 300-700 мс между мерцаниями
        glitchIntervals.push(interval);
    }

    // Применяем к статическим элементам
    function applyGlitchToStatic() {
        const title = document.getElementById('glitchTitle');
        const footer = document.getElementById('glitchFooter');
        if (title) applyGlitchToElement(title);
        if (footer) applyGlitchToElement(footer);
        // Кнопка "ЖМЯК" тоже может мерцать, но это необязательно
        const startBtn = document.getElementById('startBtn');
        if (startBtn && !startBtn.hasGlitch) {
            applyGlitchToElement(startBtn);
            startBtn.hasGlitch = true;
        }
        const closeBtn = document.getElementById('closeBtn');
        if (closeBtn && !closeBtn.hasGlitch) {
            applyGlitchToElement(closeBtn);
            closeBtn.hasGlitch = true;
        }
    }

    // Динамический статус с сохранением анимации
    function updateStatusText(newText) {
        const statusDiv = document.getElementById('playbackStatus');
        if (!statusDiv) return;
        // Сохраняем оригинальный текст без HTML-тегов
        statusDiv.innerText = newText;
        // Применяем эффект мерцания к каждой букве
        const letters = newText.split('');
        const spans = letters.map(char => {
            if (char === ' ') return ' ';
            return `<span class="glitch-letter">${char}</span>`;
        });
        statusDiv.innerHTML = spans.join('') + '<span class="blinking-cursor">_</span>';
        
        // Добавляем мерцание для новых букв
        const spansList = statusDiv.querySelectorAll('.glitch-letter');
        if (spansList.length > 0) {
            const interval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * spansList.length);
                const letter = spansList[randomIndex];
                if (letter) {
                    letter.classList.add('off');
                    setTimeout(() => letter.classList.remove('off'), 150);
                }
            }, Math.random() * 400 + 300);
            glitchIntervals.push(interval);
        }
    }

    // ---------- ОСНОВНАЯ ЛОГИКА РАДИО ----------
    const audioUrl = "https://videotourl.com/audio/1775763278412-e5f55dc7-1efc-4948-9f59-cb84416861e2.mp3";

    const audio = document.getElementById('radioPlayer');
    const vinylVideo = document.getElementById('vinylVideo');
    const tg = window.Telegram.WebApp;

    function savePosition() {
        if (audio && !isNaN(audio.currentTime) && audio.currentTime > 0) {
            localStorage.setItem('radio_position', audio.currentTime);
        }
    }

    function loadTrack() {
        audio.src = audioUrl;
        audio.load();
        const savedTime = localStorage.getItem('radio_position');
        if (savedTime && !isNaN(parseFloat(savedTime))) {
            audio.currentTime = parseFloat(savedTime);
            const mins = Math.floor(parseFloat(savedTime) / 60);
            const secs = Math.floor(parseFloat(savedTime) % 60).toString().padStart(2,'0');
            updateStatusText(`⏸ ТАЙМКОД (${mins}:${secs})`);
        } else {
            audio.currentTime = 0;
            updateStatusText(`НАЖМИ СЛЫШАТЬ`);
        }
    }

    function startSpinning() {
        vinylVideo.classList.add('spinning');
        vinylVideo.play().catch(e => console.log("video autoplay blocked", e));
    }
    function stopSpinning() {
        vinylVideo.classList.remove('spinning');
        vinylVideo.pause();
    }

    function startPlayback() {
        audio.play().then(() => {
            updateStatusText(`СЛЫШИШЬ?`);
            startSpinning();
        }).catch((err) => {
            updateStatusText(`❌ ОШИБКА`);
            console.error(err);
        });
    }

    audio.addEventListener('play', () => {
        updateStatusText(`СЛЫШИШЬ?`);
        startSpinning();
    });
    audio.addEventListener('pause', () => {
        updateStatusText(`⏸ ПАУЗА (нажми СТАРТ)`);
        stopSpinning();
    });
    audio.addEventListener('ended', () => {
        audio.currentTime = 0;
        localStorage.setItem('radio_position', 0);
        updateStatusText(`FIN (СТАРТ заново)`);
        stopSpinning();
    });

    setInterval(() => {
        if (audio && !audio.paused && !isNaN(audio.currentTime)) {
            savePosition();
        }
    }, 2000);
    window.addEventListener('beforeunload', () => savePosition());

    tg.expand();
    tg.MainButton.setText("ЗАКРЫТЬ");
    tg.MainButton.onClick(() => tg.close());
    tg.MainButton.show();
    document.getElementById('closeBtn').addEventListener('click', () => tg.close());

    document.getElementById('startBtn').addEventListener('click', () => {
        if (!audio.src || audio.src === "") {
            loadTrack();
        }
        startPlayback();
    });

    // Запуск
    loadTrack();
    if (audio.currentTime > 0 && !audio.paused) {
        startSpinning();
    } else {
        stopSpinning();
    }
    
    // Применяем анимацию к статическим элементам (заголовок, футер, кнопки)
    applyGlitchToStatic();
</script>
</body>
</html>
