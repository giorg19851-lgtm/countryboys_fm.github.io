<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vinyl Selector</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            position: relative;
        }

        /* Контейнер с кнопками */
        .lobby {
            text-align: center;
            width: 90%;
            max-width: 600px;
            z-index: 2;
        }

        /* Заголовок */
        h1 {
            font-size: 32px;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            margin-bottom: 50px;
            letter-spacing: 4px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 5px white; }
            50% { opacity: 1; text-shadow: 0 0 20px white; }
        }

        /* Контейнер для двух пластинок */
        .vinyl-selector {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Стиль кнопки-пластинки */
        .vinyl-button {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        .vinyl-button:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px rgba(255,255,255,0.6));
        }

        .vinyl-button:active {
            transform: scale(0.98);
        }

        /* Сама пластинка (круг с картинкой) */
        .vinyl-disc {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: box-shadow 0.2s;
        }

        /* Чёрное отверстие в центре */
        .vinyl-disc::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: black;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px white;
        }

        /* Подпись под кнопкой */
        .vinyl-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            color: white;
            text-shadow: 1px 1px 0 black;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        /* Скрытый аудиоплеер для лобби */
        #lobbyAudio {
            display: none;
        }

        /* Адаптивность */
        @media (max-width: 500px) {
            h1 { font-size: 24px; margin-bottom: 30px; }
            .vinyl-disc { width: 130px; height: 130px; }
            .vinyl-label { font-size: 9px; }
            .vinyl-selector { gap: 20px; }
        }
    </style>
</head>
<body>

<div class="lobby">
    <h1>ВЫБИРАЙ</h1>
    <div class="vinyl-selector">
        <!-- Кнопка 1: Макет (просто кнопка, ничего не делает, только музыка лобби) -->
        <button class="vinyl-button" id="mockupBtn">
            <div class="vinyl-disc" style="background-image: url('https://raw.githubusercontent.com/giorg19851-lgtm/countryboys_fm.github.io/main/fm.png');"></div>
            <div class="vinyl-label">3</div>
        </button>

        <!-- Кнопка 2: Переход на диджей-сет (ваш основной плеер) -->
        <button class="vinyl-button" id="djsetBtn">
            <div class="vinyl-disc" style="background-image: url('https://raw.githubusercontent.com/giorg19851-lgtm/countryboys_fm.github.io/main/fm.png');"></div>
            <div class="vinyl-label">17</div>
        </button>
    </div>
</div>

<!-- Фоновая музыка для лобби -->
<audio id="lobbyAudio" autoplay loop>
    <source src="https://image2url.com/r2/default/audio/1775781111930-526b21fb-d872-4a73-a9f8-acfcc4264107.mp3" type="audio/mpeg">
</audio>

<script>
    // Получаем элементы
    const lobbyAudio = document.getElementById('lobbyAudio');
    const mockupBtn = document.getElementById('mockupBtn');
    const djsetBtn = document.getElementById('djsetBtn');

    // URL вашего основного плеера с диджей-сетом (замените на свой, если нужно)
    const DJ_SET_URL = "https://giorg19851-lgtm.github.io/countryboys_fm.github.io/";

    // Обработчик для кнопки "МАКЕТ" — просто заглушка, ничего не делает
    mockupBtn.addEventListener('click', () => {
        // Можно добавить вибрацию или сообщение, если хотите
        console.log("Макет нажат, ничего не происходит");
        // Опционально: показать всплывашку, что это демо
        alert("Это макет. Вторая кнопка ведёт на радио.");
    });

    // Обработчик для кнопки "ДИДЖЕЙ СЕТ" — переход на основной плеер
    djsetBtn.addEventListener('click', () => {
        // Останавливаем музыку лобби, чтобы не накладывалась
        lobbyAudio.pause();
        // Переходим на страницу с диджей-сетом
        window.location.href = DJ_SET_URL;
    });

    // Боремся с автовоспроизведением (браузеры блокируют)
    // Пробуем запустить музыку лобби автоматически, если блокируется — ждём первого касания
    function attemptPlay() {
        lobbyAudio.play().catch(() => {
            const playOnInteraction = () => {
                lobbyAudio.play();
                document.body.removeEventListener('touchstart', playOnInteraction);
                document.body.removeEventListener('click', playOnInteraction);
            };
            document.body.addEventListener('touchstart', playOnInteraction);
            document.body.addEventListener('click', playOnInteraction);
        });
    }
    window.addEventListener('load', attemptPlay);

    // Анимация вращения пластинок при наведении (опционально)
    const discs = document.querySelectorAll('.vinyl-disc');
    discs.forEach(disc => {
        disc.style.transition = 'transform 0.3s linear';
        disc.addEventListener('mouseenter', () => {
            disc.style.transform = 'rotate(10deg) scale(1.02)';
        });
        disc.addEventListener('mouseleave', () => {
            disc.style.transform = 'rotate(0deg) scale(1)';
        });
    });
</script>
</body>
</html>
