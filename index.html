<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vinyl Selector</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            position: relative;
        }

        /* Контейнер с кнопками */
        .lobby {
            text-align: center;
            width: 90%;
            max-width: 600px;
            z-index: 2;
        }

        /* Контейнер для двух пластинок */
        .vinyl-selector {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Стиль кнопки-пластинки */
        .vinyl-button {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        .vinyl-button:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px rgba(255,255,255,0.6));
        }

        .vinyl-button:active {
            transform: scale(0.98);
        }

        /* Сама пластинка (круг с картинкой) */
        .vinyl-disc {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: box-shadow 0.2s;
        }

        /* Чёрное отверстие в центре */
        .vinyl-disc::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: black;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px white;
        }

        /* Подпись под кнопкой */
        .vinyl-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            color: white;
            text-shadow: 1px 1px 0 black;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        /* Скрытый аудиоплеер для лобби */
        #lobbyAudio {
            display: none;
        }

        /* Адаптивность */
        @media (max-width: 500px) {
            .vinyl-disc { width: 130px; height: 130px; }
            .vinyl-label { font-size: 9px; }
            .vinyl-selector { gap: 20px; }
        }
    </style>
</head>
<body>

<div class="lobby">
    <div class="vinyl-selector">
        <!-- Левая кнопка: bathroom pov -->
        <button class="vinyl-button" id="bathroomBtn">
            <div class="vinyl-disc" style="background-image: url('https://raw.githubusercontent.com/giorg19851-lgtm/countryboys_fm.github.io/main/fm.png');"></div>
            <div class="vinyl-label">bathroom pov</div>
        </button>

        <!-- Правая кнопка: for when the oxxy bussin -->
        <button class="vinyl-button" id="djsetBtn">
            <div class="vinyl-disc" style="background-image: url('https://raw.githubusercontent.com/giorg19851-lgtm/countryboys_fm.github.io/main/fm.png');"></div>
            <div class="vinyl-label">for when the oxxy bussin</div>
        </button>
    </div>
</div>

<!-- Фоновая музыка для лобби (трек для левой пластинки) -->
<audio id="lobbyAudio" autoplay loop>
    <source src="https://videotourl.com/audio/1775784829266-243b505c-ea49-499c-a8cf-fb8b3d856300.mp3" type="audio/mpeg">
</audio>

<script>
    // Получаем элементы
    const lobbyAudio = document.getElementById('lobbyAudio');
    const bathroomBtn = document.getElementById('bathroomBtn');
    const djsetBtn = document.getElementById('djsetBtn');

    // URL вашего основного плеера с диджей-сетом
    const DJ_SET_URL = "https://giorg19851-lgtm.github.io/countryboys_fm.github.io/";

    // Обработчик для левой кнопки "bathroom pov" — ничего не делает, просто играет фоновая музыка
    bathroomBtn.addEventListener('click', () => {
        console.log("bathroom pov нажата");
        // Можно добавить всплывашку, но не обязательно
        alert("Это демо-режим. Вторая пластинка ведёт на радио.");
    });

    // Обработчик для правой кнопки — переход на основной плеер
    djsetBtn.addEventListener('click', () => {
        lobbyAudio.pause(); // останавливаем музыку лобби
        window.location.href = DJ_SET_URL; // переходим
    });

    // Боремся с автовоспроизведением (браузеры блокируют)
    function attemptPlay() {
        lobbyAudio.play().catch(() => {
            const playOnInteraction = () => {
                lobbyAudio.play();
                document.body.removeEventListener('touchstart', playOnInteraction);
                document.body.removeEventListener('click', playOnInteraction);
            };
            document.body.addEventListener('touchstart', playOnInteraction);
            document.body.addEventListener('click', playOnInteraction);
        });
    }
    window.addEventListener('load', attemptPlay);

    // Анимация вращения пластинок при наведении
    const discs = document.querySelectorAll('.vinyl-disc');
    discs.forEach(disc => {
        disc.style.transition = 'transform 0.3s linear';
        disc.addEventListener('mouseenter', () => {
            disc.style.transform = 'rotate(10deg) scale(1.02)';
        });
        disc.addEventListener('mouseleave', () => {
            disc.style.transform = 'rotate(0deg) scale(1)';
        });
    });
</script>
</body>
</html>
