<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>8-Bit Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        /* ЧЁРНО-БЕЛАЯ ТЕМА */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            background-color: #000000;
            position: relative;
        }

        /* ФОНОВОЕ ИЗОБРАЖЕНИЕ (усиление яркости и белых тонов) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/giorg19851-lgtm/countryboys_fm.github.io/main/fm.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(150%) contrast(120%) grayscale(30%);
            opacity: 0.9;
            z-index: -2;
        }

        /* ПИКСЕЛЬНЫЙ ШУМ (серый) */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,0.03) 0px, rgba(0,0,0,0.15) 2px, transparent 3px);
            background-size: 4px 4px;
            pointer-events: none;
            z-index: -1;
            image-rendering: pixelated;
            mix-blend-mode: overlay;
        }

        /* КАРТОЧКА ПЛЕЕРА (чёрно-белая) */
        .player-card {
            background: #000000cc;
            border: 3px solid #ffffff;
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 20px #ffffff44;
            backdrop-filter: blur(2px);
        }

        h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            color: #ffffff;
            text-shadow: 2px 2px 0 #444444;
            margin-bottom: 20px;
            letter-spacing: 2px;
            border-bottom: 1px dashed #ffffff;
            display: inline-block;
            padding-bottom: 8px;
        }

        .status {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            background: #000000;
            border: 2px solid #ffffff;
            padding: 12px;
            margin: 20px auto;
            width: fit-content;
            color: #ffffff;
        }

        .footer {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #aaaaaa;
            margin-top: 20px;
            border-top: 1px solid #ffffff;
            padding-top: 12px;
        }

        .controls {
            margin: 15px 0 10px;
        }

        button {
            background: #000000;
            border: 2px solid #ffffff;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 8px 16px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.05s linear;
        }

        button:active {
            background: #ffffff;
            color: #000000;
            transform: scale(0.98);
        }

        .blinking-cursor {
            display: inline-block;
            width: 10px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="player-card">
        <h1>🎧 DJ TOKYO ALREADY HATES US</h1>
        
        <audio id="radioPlayer" style="display: none;" preload="auto"></audio>
        
        <div class="status" id="playbackStatus">
            ⚫ НАЖМИ СТАРТ <span class="blinking-cursor">_</span>
        </div>
        <div class="controls">
            <button id="startBtn">▶ СТАРТ</button>
        </div>
        <div class="footer">
            выключи эту хуйню ❤️
        </div>
        <button id="closeBtn">ЗАКРЫТЬ ПЛЕЕР</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // НОВАЯ ССЫЛКА НА МР3
        const audioUrl = "https://videotourl.com/audio/1775763278412-e5f55dc7-1efc-4948-9f59-cb84416861e2.mp3";

        const audio = document.getElementById('radioPlayer');
        const statusDiv = document.getElementById('playbackStatus');
        const tg = window.Telegram.WebApp;

        function savePosition() {
            if (audio && !isNaN(audio.currentTime) && audio.currentTime > 0) {
                localStorage.setItem('radio_position', audio.currentTime);
            }
        }

        function loadTrack() {
            audio.src = audioUrl;
            audio.load();
            
            const savedTime = localStorage.getItem('radio_position');
            if (savedTime && !isNaN(parseFloat(savedTime))) {
                audio.currentTime = parseFloat(savedTime);
                const mins = Math.floor(parseFloat(savedTime) / 60);
                const secs = Math.floor(parseFloat(savedTime) % 60).toString().padStart(2,'0');
                statusDiv.innerHTML = `⏸ ГОТОВ (${mins}:${secs}) <span class="blinking-cursor">_</span>`;
            } else {
                audio.currentTime = 0;
                statusDiv.innerHTML = `⚫ НАЖМИ СТАРТ <span class="blinking-cursor">_</span>`;
            }
        }

        function startPlayback() {
            audio.play().then(() => {
                statusDiv.innerHTML = `🎵 ИГРАЕТ <span class="blinking-cursor">_</span>`;
            }).catch((err) => {
                statusDiv.innerHTML = `❌ ОШИБКА: нажми ещё раз <span class="blinking-cursor">_</span>`;
                console.error(err);
            });
        }

        audio.addEventListener('play', () => {
            statusDiv.innerHTML = `🎵 ИГРАЕТ <span class="blinking-cursor">_</span>`;
        });
        
        audio.addEventListener('pause', () => {
            statusDiv.innerHTML = `⏸ ПАУЗА (нажми СТАРТ) <span class="blinking-cursor">_</span>`;
        });
        
        audio.addEventListener('ended', () => {
            audio.currentTime = 0;
            localStorage.setItem('radio_position', 0);
            statusDiv.innerHTML = `🏁 ТРЕК ЗАВЕРШЁН (нажми СТАРТ сначала) <span class="blinking-cursor">_</span>`;
        });

        setInterval(() => {
            if (audio && !audio.paused && !isNaN(audio.currentTime)) {
                savePosition();
            }
        }, 2000);
        
        window.addEventListener('beforeunload', () => savePosition());

        tg.expand();
        tg.MainButton.setText("ЗАКРЫТЬ");
        tg.MainButton.onClick(() => tg.close());
        tg.MainButton.show();
        document.getElementById('closeBtn').addEventListener('click', () => tg.close());

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!audio.src || audio.src === "") {
                loadTrack();
            }
            startPlayback();
        });

        loadTrack();
    </script>
</body>
</html>
