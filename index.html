<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vinyl Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            position: relative;
            overflow: hidden;
        }

        /* Контейнер с винилом */
        .vinyl-container {
            position: relative;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            overflow: visible;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Сам диск */
        .vinyl-disc {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-image: url('https://raw.githubusercontent.com/giorg19851-lgtm/countryboys_fm.github.io/main/fm.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            transition: box-shadow 0.2s;
            /* Чёрное отверстие в центре (псевдоэлемент) */
        }
        .vinyl-disc::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12%;
            height: 12%;
            background: black;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px white;
        }

        /* Анимация вращения */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .vinyl-disc.spinning {
            animation: spin 4s linear infinite;
        }

        /* Контент поверх диска (текст, кнопки) */
        .vinyl-content {
            position: relative;
            z-index: 10;
            width: 70%;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 0 black;
            background-color: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 15px 10px;
            backdrop-filter: blur(4px);
            border: 1px solid white;
            pointer-events: auto;
        }

        h1 {
            font-size: 14px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            word-break: break-word;
        }

        .status {
            font-size: 10px;
            background: black;
            border: 1px solid white;
            padding: 8px;
            margin: 10px 0;
            font-family: 'Press Start 2P', monospace;
        }

        .controls {
            margin: 10px 0;
        }

        button {
            background: black;
            border: 1px solid white;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
            margin: 5px;
        }
        button:active {
            background: white;
            color: black;
        }

        .footer {
            font-size: 8px;
            margin-top: 10px;
            color: #aaa;
        }

        .blinking-cursor {
            display: inline-block;
            width: 8px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
<div class="vinyl-container">
    <div class="vinyl-disc" id="vinylDisc"></div>
    <div class="vinyl-content">
        <h1>🎧 DJ TOKYO ALREADY HATES US</h1>
        <div class="status" id="playbackStatus">⚫ НАЖМИ СЛЫШАТЬ</div>
        <div class="controls">
            <button id="startBtn">▶ СЛЫШАТЬ</button>
        </div>
        <div class="footer">выключи эту хуйню </div>
        <button id="closeBtn">НЕ СЛЫШАТЬ</button>
    </div>
</div>

<audio id="radioPlayer" style="display: none;" preload="auto"></audio>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // АУДИО ССЫЛКА (ваша)
    const audioUrl = "https://videotourl.com/audio/1775763278412-e5f55dc7-1efc-4948-9f59-cb84416861e2.mp3";

    const audio = document.getElementById('radioPlayer');
    const statusDiv = document.getElementById('playbackStatus');
    const vinylDisc = document.getElementById('vinylDisc');
    const tg = window.Telegram.WebApp;

    // Сохранение позиции
    function savePosition() {
        if (audio && !isNaN(audio.currentTime) && audio.currentTime > 0) {
            localStorage.setItem('radio_position', audio.currentTime);
        }
    }

    // Загрузка трека и восстановление позиции
    function loadTrack() {
        audio.src = audioUrl;
        audio.load();
        const savedTime = localStorage.getItem('radio_position');
        if (savedTime && !isNaN(parseFloat(savedTime))) {
            audio.currentTime = parseFloat(savedTime);
            const mins = Math.floor(parseFloat(savedTime) / 60);
            const secs = Math.floor(parseFloat(savedTime) % 60).toString().padStart(2,'0');
            statusDiv.innerHTML = `⏸ ГОТОВ (${mins}:${secs})<span class="blinking-cursor">_</span>`;
        } else {
            audio.currentTime = 0;
            statusDiv.innerHTML = `⚫ НАЖМИ СТАРТ<span class="blinking-cursor">_</span>`;
        }
    }

    // Запуск вращения диска
    function startSpinning() {
        vinylDisc.classList.add('spinning');
    }
    function stopSpinning() {
        vinylDisc.classList.remove('spinning');
    }

    // Запуск воспроизведения
    function startPlayback() {
        audio.play().then(() => {
            statusDiv.innerHTML = ` СНОВА СЛЫШАТЬ<span class="blinking-cursor">_</span>`;
            startSpinning();
        }).catch((err) => {
            statusDiv.innerHTML = `❌ ОШИБКА<span class="blinking-cursor">_</span>`;
            console.error(err);
        });
    }

    // События аудио
    audio.addEventListener('play', () => {
        statusDiv.innerHTML = `СЛУШАНИЕ<span class="blinking-cursor">_</span>`;
        startSpinning();
    });
    audio.addEventListener('pause', () => {
        statusDiv.innerHTML = `⏸ ПАУЗА (нажми СТАРТ)<span class="blinking-cursor">_</span>`;
        stopSpinning();
    });
    audio.addEventListener('ended', () => {
        audio.currentTime = 0;
        localStorage.setItem('radio_position', 0);
        statusDiv.innerHTML = `🏁 ТРЕК ЗАВЕРШЁН (СТАРТ заново)<span class="blinking-cursor">_</span>`;
        stopSpinning();
    });

    // Сохранение позиции каждые 2 сек
    setInterval(() => {
        if (audio && !audio.paused && !isNaN(audio.currentTime)) {
            savePosition();
        }
    }, 2000);
    window.addEventListener('beforeunload', () => savePosition());

    // Telegram WebApp
    tg.expand();
    tg.MainButton.setText("ЗАКРЫТЬ");
    tg.MainButton.onClick(() => tg.close());
    tg.MainButton.show();
    document.getElementById('closeBtn').addEventListener('click', () => tg.close());

    // Кнопка старта
    document.getElementById('startBtn').addEventListener('click', () => {
        if (!audio.src || audio.src === "") {
            loadTrack();
        }
        startPlayback();
    });

    // Инициализация
    loadTrack();
    // Если аудио уже играло (восстановлено из сохранения) – проверим и запустим вращение
    if (audio.currentTime > 0 && !audio.paused) {
        startSpinning();
    } else {
        stopSpinning();
    }
</script>
</body>
</html>
