<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vinyl Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }

        /* Контейнер-пластинка (круг) */
        .vinyl {
            position: relative;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        /* Видео-фон (вращается) */
        .vinyl-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            pointer-events: none; /* чтобы кнопки были кликабельны */
        }
        /* Анимация вращения */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .vinyl-video.spinning {
            animation: spin 4s linear infinite;
        }

        /* Чёрное отверстие в центре (вращается вместе с видео) */
        .vinyl-video::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12%;
            height: 12%;
            background: black;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px white;
            pointer-events: none;
        }

        /* Слой с кнопками и текстом (не вращается) */
        .vinyl-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55%;   /* Уменьшено для центрирования и компактности */
            text-align: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            border: 1px solid white;
            border-radius: 30px;
            padding: 10px 8px;
            z-index: 10;
            pointer-events: auto;
        }

        /* Все элементы внутри уменьшены на ~20% */
        h1 {
            font-size: 11px;
            margin-bottom: 10px;
            letter-spacing: 1px;
            color: white;
            text-shadow: 1px 1px 0 black;
            word-break: break-word;
        }

        .status {
            font-size: 8px;
            background: black;
            border: 1px solid white;
            padding: 6px;
            margin: 8px 0;
            font-family: 'Press Start 2P', monospace;
            color: white;
        }

        .controls {
            margin: 8px 0;
        }

        button {
            background: black;
            border: 1px solid white;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 5px 10px;
            color: white;
            cursor: pointer;
            margin: 3px;
        }
        button:active {
            background: white;
            color: black;
        }

        .footer {
            font-size: 6px;
            margin-top: 8px;
            color: #aaa;
        }

        .blinking-cursor {
            display: inline-block;
            width: 6px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
<div class="vinyl">
    <video class="vinyl-video" id="vinylVideo" loop muted playsinline>
        <source src="https://github.com/giorg19851-lgtm/countryboys_fm.github.io/raw/refs/heads/main/document_5386562835193042585.mp4" type="video/mp4">
    </video>
    <div class="vinyl-controls">
        <h1>COUNTRY BOYS FM</h1>
        <div class="status" id="playbackStatus"> НАЖМИ СЛЫШАТЬ</div>
        <div class="controls">
            <button id="startBtn">СЛАШЫТЬ</button>
        </div>
        <div class="footer">выключи эту хуйню </div>
        <button id="closeBtn">НЕ СЛЫШАТЬ</button>
    </div>
</div>

<audio id="radioPlayer" style="display: none;" preload="auto"></audio>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // АУДИО ССЫЛКА (ваша)
    const audioUrl = "https://videotourl.com/audio/1775763278412-e5f55dc7-1efc-4948-9f59-cb84416861e2.mp3";

    const audio = document.getElementById('radioPlayer');
    const statusDiv = document.getElementById('playbackStatus');
    const vinylVideo = document.getElementById('vinylVideo');
    const tg = window.Telegram.WebApp;

    // Сохранение позиции аудио
    function savePosition() {
        if (audio && !isNaN(audio.currentTime) && audio.currentTime > 0) {
            localStorage.setItem('radio_position', audio.currentTime);
        }
    }

    // Загрузка трека и восстановление позиции
    function loadTrack() {
        audio.src = audioUrl;
        audio.load();
        const savedTime = localStorage.getItem('radio_position');
        if (savedTime && !isNaN(parseFloat(savedTime))) {
            audio.currentTime = parseFloat(savedTime);
            const mins = Math.floor(parseFloat(savedTime) / 60);
            const secs = Math.floor(parseFloat(savedTime) % 60).toString().padStart(2,'0');
            statusDiv.innerHTML = `⏸ ТАЙМКОД (${mins}:${secs})<span class="blinking-cursor">_</span>`;
        } else {
            audio.currentTime = 0;
            statusDiv.innerHTML = ` НАЖМИ СЛЫШАТЬ<span class="blinking-cursor">_</span>`;
        }
    }

    // Запуск вращения видео
    function startSpinning() {
        vinylVideo.classList.add('spinning');
        vinylVideo.play().catch(e => console.log("video autoplay blocked", e));
    }
    function stopSpinning() {
        vinylVideo.classList.remove('spinning');
        vinylVideo.pause();
    }

    // Запуск воспроизведения аудио
    function startPlayback() {
        audio.play().then(() => {
            statusDiv.innerHTML = `СЛЫШИШЬ?<span class="blinking-cursor">_</span>`;
            startSpinning();
        }).catch((err) => {
            statusDiv.innerHTML = `❌ ОШИБКА<span class="blinking-cursor">_</span>`;
            console.error(err);
        });
    }

    // События аудио
    audio.addEventListener('play', () => {
        statusDiv.innerHTML = `СЛЫШИШЬ<span class="blinking-cursor">_</span>`;
        startSpinning();
    });
    audio.addEventListener('pause', () => {
        statusDiv.innerHTML = `⏸ ПАУЗА (нажми СТАРТ)<span class="blinking-cursor">_</span>`;
        stopSpinning();
    });
    audio.addEventListener('ended', () => {
        audio.currentTime = 0;
        localStorage.setItem('radio_position', 0);
        statusDiv.innerHTML = `FIN (СТАРТ заново)<span class="blinking-cursor">_</span>`;
        stopSpinning();
    });

    // Сохранение позиции каждые 2 сек
    setInterval(() => {
        if (audio && !audio.paused && !isNaN(audio.currentTime)) {
            savePosition();
        }
    }, 2000);
    window.addEventListener('beforeunload', () => savePosition());

    // Telegram WebApp
    tg.expand();
    tg.MainButton.setText("ЗАКРЫТЬ");
    tg.MainButton.onClick(() => tg.close());
    tg.MainButton.show();
    document.getElementById('closeBtn').addEventListener('click', () => tg.close());

    // Кнопка старта
    document.getElementById('startBtn').addEventListener('click', () => {
        if (!audio.src || audio.src === "") {
            loadTrack();
        }
        startPlayback();
    });

    // Инициализация
    loadTrack();
    // Если аудио уже играло (восстановлено) – запустим вращение
    if (audio.currentTime > 0 && !audio.paused) {
        startSpinning();
    } else {
        stopSpinning();
    }
</script>
</body>
</html>
